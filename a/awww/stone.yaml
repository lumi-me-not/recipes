name        : awww
version     : 0.11.2
release     : 1
homepage    : https://codeberg.org/LGFae/awww
upstreams   :
    - https://codeberg.org/LGFae/awww/archive/v0.11.2.tar.gz : 0bd1d3a7461b1bc0b99f49aa64ce01d3e84412c5afd6534a1221c4aa3341ccd6
summary     : An Answer to your Wayland Wallpaper Woes
description : |
    Efficient animated wallpaper daemon for wayland, controlled at runtime
license     : 
    - GPL-3.0-only
networking  : true
builddeps   :
    - pkgconfig(liblz4)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-protocols)
setup       : |
    %cargo_fetch
build       : |
    %cargo_build
install     : |
    %cargo_install swww swww-daemon
check       : |
    %cargo_test
