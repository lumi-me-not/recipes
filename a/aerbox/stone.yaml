name        : aerbox
version     : "0.0.1-e3f2ac80ae58e9aca7766908b8e2860512fc3b94"
release     : 1
homepage    : https://codeberg.org/lumi/aerbox
upstreams   :
    - https://codeberg.org/lumi/aerbox/archive/e3f2ac80ae58e9aca7766908b8e2860512fc3b94.tar.gz : f3f15b5941436634e6d6cd10e3d255781971753f657055c2b2324b583ef37862
